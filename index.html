<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathEngine v3 - Final</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #0070f3; --s: #f5f5f7; --txt: #1d1d1f; --acc: #f43f5e; }
        body { font-family: -apple-system, sans-serif; background: var(--s); color: var(--txt); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #d2d2d7; flex-shrink: 0; z-index: 10; }
        .tab { flex: 1; padding: 16px; text-align: center; cursor: pointer; font-weight: 600; color: #86868b; font-size: 0.9rem; }
        .tab.active { color: var(--p); border-bottom: 3px solid var(--p); }
        .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; overflow-y: auto; } }
        .sidebar { padding: 20px; overflow-y: auto; background: #fff; border-right: 1px solid #d2d2d7; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--s); border-radius: 12px; padding: 15px; border: 1px solid #d2d2d7; }
        h3 { font-size: 0.7rem; text-transform: uppercase; color: #86868b; margin: 0 0 10px 0; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d2d2d7; margin-top: 5px; box-sizing: border-box; font-size: 1rem; outline: none; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .math { font-family: 'monospace'; font-weight: bold; color: var(--p); font-size: 1.1rem; }
        .sol-box { color: var(--acc); border-left: 4px solid var(--acc); padding-left: 12px; margin-top: 5px; }
        #canvas-wrap { flex: 1; background: white; margin: 15px; border-radius: 15px; border: 1px solid #d2d2d7; position: relative; min-height: 350px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="tabs">
    <div id="t-func" class="tab active" onclick="canviarPestanya('func')">Funcions</div>
    <div id="t-eq" class="tab" onclick="canviarPestanya('eq')">Equacions</div>
    <div id="t-sys" class="tab" onclick="canviarPestanya('sys')">Sistemes</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div id="pane-func">
            <h3>Funció f(x)</h3>
            <input type="text" id="func-in" value="x^2 - 4x + 3">
            <button class="btn" onclick="executaFuncio()">Dibuixar i Analitzar</button>
        </div>

        <div id="pane-eq" class="hidden">
            <h3>Equació d'ESO</h3>
            <input type="text" id="eq-in" value="3x + 6 = 12">
            <button class="btn" onclick="executaEquacio()">Trobar x</button>
        </div>

        <div id="pane-sys" class="hidden">
            <h3>Sistema (Mètode Gràfic)</h3>
            <input type="text" id="sys-1" value="3x + y = 2">
            <input type="text" id="sys-2" value="2x - y = 3" style="margin-top:10px;">
            <button class="btn" onclick="executaSistema()">Troba la Intersecció</button>
        </div>

        <div id="output" class="hidden">
            <div class="card">
                <h3 id="res-title">Resultats</h3>
                <div id="res-val" class="math"></div>
            </div>
        </div>
    </div>

    <div id="canvas-wrap">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    let elMeuGrafic = null;

    function canviarPestanya(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + id).classList.add('active');
        ['pane-func', 'pane-eq', 'pane-sys'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById('pane-' + id).classList.remove('hidden');
        document.getElementById('output').classList.add('hidden');

        if (elMeuGrafic) {
            elMeuGrafic.destroy();
            elMeuGrafic = null;
        }
    }

    function dibuixa(datasets, puntsSpecials) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (elMeuGrafic) elMeuGrafic.destroy();

        elMeuGrafic = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: datasets.map(d => ({
                    data: d.data, borderColor: d.borderColor, borderWidth: 3, pointRadius: 0, tension: 0.1, fill: false
                })).concat([{
                    data: puntsSpecials, pointBackgroundColor: '#f43f5e', pointRadius: 7, showLine: false
                }])
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', position: 'center', min: -10, max: 10 },
                    y: { type: 'linear', position: 'center', min: -10, max: 10 }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function mostraResultat(titol, valor) {
        document.getElementById('output').classList.remove('hidden');
        document.getElementById('res-title').innerText = titol;
        document.getElementById('res-val').innerHTML = valor;
    }

    function executaFuncio() {
        const expr = document.getElementById('func-in').value;
        const res = calculsBase(expr);
        mostraResultat("Anàlisi de Funció", res.txt);
        dibuixa([{data: res.punts, borderColor: '#0070f3'}], res.talls);
    }

    function executaEquacio() {
        const raw = document.getElementById('eq-in').value;
        const expr = raw.includes('=') ? `(${raw.split('=')[0]}) - (${raw.split('=')[1]})` : raw;
        const res = calculsBase(expr);
        const solX = res.talls.filter(t => t.type === 'X').map(t => t.x).join(", ");
        mostraResultat("Resultat X", solX ? `x = ${solX}` : "Cap solució real");
        dibuixa([{data: res.punts, borderColor: '#0070f3'}], res.talls.filter(t => t.type === 'X'));
    }

    function executaSistema() {
        const e1 = document.getElementById('sys-1').value.replace('=', '==');
        const e2 = document.getElementById('sys-2').value.replace('=', '==');
        
        try {
            // Solució algebraica exacta
            const sol = math.solveSystem([e1, e2]);
            const xFinal = Math.round(sol[0] * 100) / 100;
            const yFinal = Math.round(sol[1] * 100) / 100;

            const recte1 = [], recte2 = [];
            for (let i = -10; i <= 10; i += 1) {
                const r1 = math.solveSystem([e1.replace(/x/g, `(${i})`), 'x == ' + i]);
                recte1.push({x: i, y: r1[1]});
                const r2 = math.solveSystem([e2.replace(/x/g, `(${i})`), 'x == ' + i]);
                recte2.push({x: i, y: r2[1]});
            }

            mostraResultat("Punt d'intersecció", `<div class="sol-box">P(${xFinal}, ${yFinal})</div>`);
            dibuixa([
                {data: recte1, borderColor: '#0070f3'},
                {data: recte2, borderColor: '#acc'}
            ], [{x: xFinal, y: yFinal}]);
        } catch(err) {
            mostraResultat("Error", "Format: Ax + By = C");
        }
    }

    function calculsBase(expr) {
        const f = math.compile(expr);
        let punts = [], talls = [];
        try { let y0 = f.evaluate({x:0}); talls.push({x:0, y: Math.round(y0*100)/100, type:'Y'}); } catch(e){}
        for (let x = -10; x <= 10; x += 0.1) {
            let y = f.evaluate({x});
            punts.push({x, y});
            if (Math.abs(y) < 0.2) {
                let realX = Math.round(x * 100) / 100;
                if (!talls.find(t => t.x === realX)) talls.push({x: realX, y: 0, type:'X'});
            }
        }
        return { punts, talls, txt: talls.map(p => `${p.type}: (${p.x}, ${p.y})`).join("<br>") };
    }

    window.onload = () => executaFuncio();
</script>
</body>
</html>
