<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathEngine SuperSolver</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #0070f3; --s: #f5f5f7; --txt: #1d1d1f; --acc: #f43f5e; }
        body { font-family: -apple-system, sans-serif; background: var(--s); color: var(--txt); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #d2d2d7; flex-shrink: 0; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; color: #86868b; font-size: 0.9rem; }
        .tab.active { color: var(--p); border-bottom: 3px solid var(--p); }
        .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; overflow-y: auto; } }
        .sidebar { padding: 20px; overflow-y: auto; background: #fff; border-right: 1px solid #d2d2d7; }
        .card { background: var(--s); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #d2d2d7; }
        h3 { font-size: 0.7rem; text-transform: uppercase; color: #86868b; margin: 0 0 10px 0; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d2d2d7; margin-top: 5px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .math { font-family: 'JetBrains Mono', monospace; font-weight: bold; color: var(--p); font-size: 1.1rem; }
        #canvas-wrap { flex: 1; background: white; margin: 15px; border-radius: 15px; border: 1px solid #d2d2d7; position: relative; min-height: 350px; }
        .hidden { display: none; }
        .sol-box { color: var(--acc); font-size: 1.2rem; border-left: 4px solid var(--acc); padding-left: 10px; }
    </style>
</head>
<body>

<div class="tabs">
    <div id="t-func" class="tab active" onclick="switchTab('func')">Funcions</div>
    <div id="t-eq" class="tab" onclick="switchTab('eq')">Equacions</div>
    <div id="t-sys" class="tab" onclick="switchTab('sys')">Sistemes</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div id="pane-func">
            <h3>Funció f(x)</h3>
            <input type="text" id="func-in" value="x^2 - 4x + 3">
            <button class="btn" onclick="solveFunc()">Calcula Talls</button>
        </div>

        <div id="pane-eq" class="hidden">
            <h3>Equació</h3>
            <input type="text" id="eq-in" value="3x + 6 = 12">
            <button class="btn" onclick="solveEq()">Troba la Solució</button>
        </div>

        <div id="pane-sys" class="hidden">
            <h3>Sistema (Mètode Gràfic)</h3>
            <input type="text" id="sys-1" value="2x + y = 5" placeholder="Ex: 2x + y = 5">
            <input type="text" id="sys-2" value="x - y = 1" placeholder="Ex: x - y = 1" style="margin-top:10px;">
            <button class="btn" onclick="solveSys()">Resoldre Sistema</button>
        </div>

        <div id="output" class="hidden" style="margin-top:20px;">
            <div class="card">
                <h3>Resultat Numèric</h3>
                <div id="res-val" class="math"></div>
            </div>
        </div>
    </div>

    <div id="canvas-wrap">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    let chart = null;

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + tab).classList.add('active');
        ['pane-func', 'pane-eq', 'pane-sys'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById('pane-' + tab).classList.remove('hidden');
        document.getElementById('output').classList.add('hidden');
    }

    // --- FUNCIONS AUXILIARS ---
    function aillarY(eq) {
        try {
            const parts = eq.split('=');
            const esquerra = parts[0].trim();
            const dreta = parts.length > 1 ? parts[1].trim() : "0";
            // Truc algebraic: y = Dreta - (Esquerra sense la y)
            // Això funciona per a sistemes lineals d'ESO tipus Ax + By = C
            return `(${dreta} - (${esquerra.replace(/y/g, '0')}))`;
        } catch(e) { return "0"; }
    }

    function solveFunc() {
        const expr = document.getElementById('func-in').value;
        process(expr, 'func');
    }

    function solveEq() {
        const raw = document.getElementById('eq-in').value;
        const expr = raw.includes('=') ? `(${raw.split('=')[0]}) - (${raw.split('=')[1]})` : raw;
        process(expr, 'eq');
    }

    function solveSys() {
        const eq1Raw = document.getElementById('sys-1').value;
        const eq2Raw = document.getElementById('sys-2').value;
        
        const f1Str = aillarY(eq1Raw);
        const f2Str = aillarY(eq2Raw);
        
        const f1 = math.compile(f1Str);
        const f2 = math.compile(f2Str);
        
        let solucio = null;
        let p1 = [], p2 = [];

        for (let x = -10; x <= 10; x += 0.1) {
            let y1 = f1.evaluate({x});
            let y2 = f2.evaluate({x});
            p1.push({x, y: y1});
            p2.push({x, y: y2});
            
            if (Math.abs(y1 - y2) < 0.1 && !solucio) {
                solucio = {x: Math.round(x), y: Math.round(y1)};
            }
        }

        renderSystems(p1, p2, solucio);
        document.getElementById('output').classList.remove('hidden');
        document.getElementById('res-val').innerHTML = solucio 
            ? `<div class="sol-box">Solució: x=${solucio.x}, y=${solucio.y}</div>`
            : "No es tallen en aquest rang";
    }

    function process(expr, mode) {
        const f = math.compile(expr);
        let points = [], talls = [];
        
        for (let x = -10; x <= 10; x += 0.1) {
            let y = f.evaluate({x});
            points.push({x, y});
            if (Math.abs(y) < 0.1) {
                let xVal = Math.round(x * 100) / 100;
                if (!talls.find(t => t.x === xVal)) talls.push({x: xVal, y: 0});
            }
        }

        renderSingle(points, talls);
        document.getElementById('output').classList.remove('hidden');
        document.getElementById('res-val').innerText = mode === 'eq' 
            ? "x = " + talls.map(t => t.x).join(", ")
            : "Talls X: " + talls.map(t => t.x).join(", ");
    }

    function renderSingle(points, talls) {
        draw([{data: points, borderColor: '#0070f3'}], talls);
    }

    function renderSystems(p1, p2, sol) {
        draw([
            {data: p1, borderColor: '#0070f3'},
            {data: p2, borderColor: '#acc'}
        ], sol ? [sol] : []);
    }

    function draw(datasets, points) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        const ds = datasets.map(d => ({
            data: d.data, borderColor: d.borderColor, borderWidth: 3, pointRadius: 0, tension: 0.3, fill: false
        }));

        if (points.length > 0) {
            ds.push({
                data: points, pointBackgroundColor: '#f43f5e', pointRadius: 7, showLine: false
            });
        }

        chart = new Chart(ctx, {
            type: 'line',
            data: { datasets: ds },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', position: 'center', min: -10, max: 10, grid: {color: '#eee'} },
                    y: { type: 'linear', position: 'center', min: -10, max: 10, grid: {color: '#eee'} }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = () => { solveFunc(); };
</script>
</body>
</html>
