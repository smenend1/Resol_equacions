<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathEngine SuperSolver</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #0070f3; --s: #f5f5f7; --txt: #1d1d1f; --acc: #f43f5e; }
        body { font-family: -apple-system, sans-serif; background: var(--s); color: var(--txt); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #d2d2d7; flex-shrink: 0; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-weight: 600; color: #86868b; font-size: 0.9rem; }
        .tab.active { color: var(--p); border-bottom: 3px solid var(--p); }
        .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; overflow-y: auto; } }
        .sidebar { padding: 20px; overflow-y: auto; background: #fff; border-right: 1px solid #d2d2d7; }
        .card { background: var(--s); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid #d2d2d7; }
        h3 { font-size: 0.7rem; text-transform: uppercase; color: #86868b; margin: 0 0 10px 0; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d2d2d7; margin-top: 5px; box-sizing: border-box; font-size: 1rem; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .math { font-family: 'JetBrains Mono', monospace; font-weight: bold; color: var(--p); font-size: 1.1rem; }
        #canvas-wrap { flex: 1; background: white; margin: 15px; border-radius: 15px; border: 1px solid #d2d2d7; position: relative; min-height: 350px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="tabs">
    <div id="t-func" class="tab active" onclick="switchTab('func')">Funcions</div>
    <div id="t-eq" class="tab" onclick="switchTab('eq')">Equacions</div>
    <div id="t-sys" class="tab" onclick="switchTab('sys')">Sistemes</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div id="pane-func">
            <h3>Funció f(x)</h3>
            <input type="text" id="func-in" value="x^2 - 4x + 3">
            <button class="btn" onclick="solveFunc()">Calcula Talls</button>
        </div>

        <div id="pane-eq" class="hidden">
            <h3>Equació (Igualada o no)</h3>
            <input type="text" id="eq-in" value="3x + 6x^2 = 1">
            <button class="btn" onclick="solveEq()">Troba la Solució</button>
        </div>

        <div id="pane-sys" class="hidden">
            <h3>Sistema d'Equacions</h3>
            <input type="text" id="sys-1" value="x + y = 3">
            <input type="text" id="sys-2" value="2x - y = 1" style="margin-top:10px;">
            <button class="btn" onclick="solveSys()">Resoldre Sistema</button>
        </div>

        <div id="output" class="hidden" style="margin-top:20px;">
            <div class="card">
                <h3>Resultat Numèric</h3>
                <div id="res-val" class="math"></div>
            </div>
        </div>
    </div>

    <div id="canvas-wrap">
        <canvas id="mainChart"></canvas>
    </div>
</div>

<script>
    let chart = null;

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + tab).classList.add('active');
        ['pane-func', 'pane-eq', 'pane-sys'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById('pane-' + tab).classList.remove('hidden');
        document.getElementById('output').classList.add('hidden');
    }

    // Aquesta funció "neteja" l'equació per poder-la dibuixar
    function prepareExpr(raw) {
        if (!raw.includes('=')) return raw;
        let sides = raw.split('=');
        return `(${sides[0]}) - (${sides[1]})`;
    }

    function solveFunc() {
        const expr = document.getElementById('func-in').value;
        const results = calculatePoints(expr);
        displayResults(results.txt);
        render(results.dataSets, results.talls);
    }

    function solveEq() {
        const raw = document.getElementById('eq-in').value;
        const expr = prepareExpr(raw);
        const results = calculatePoints(expr);
        let solX = results.talls.filter(p => p.type === 'X').map(p => p.x).join(", ");
        displayResults(solX ? `x = ${solX}` : "Sense solució real");
        render(results.dataSets, results.talls.filter(p => p.type === 'X'));
    }

    function solveSys() {
        const e1 = prepareExpr(document.getElementById('sys-1').value);
        const e2 = prepareExpr(document.getElementById('sys-2').value);
        
        // Aquí fem un truc: per sistemes, busquem on e1 - e2 = 0
        const diffExpr = `(${document.getElementById('sys-1').value.split('=')[0]}) - (${document.getElementById('sys-1').value.split('=')[1]}) - ((${document.getElementById('sys-2').value.split('=')[0]}) - (${document.getElementById('sys-2').value.split('=')[1]}))`;
        
        // Per dibuixar sistemes lineals x+y=3 -> y=3-x
        const d1 = solveForY(document.getElementById('sys-1').value);
        const d2 = solveForY(document.getElementById('sys-2').value);

        displayResults("Solució: Intersecció de les rectes");
        render([{expr: d1, color: '#0070f3'}, {expr: d2, color: '#acc'}], []);
    }

    function solveForY(raw) {
        // Truc ràpid per passar Ax + By = C a f(x) per dibuixar
        try {
            const eq = raw.replace('=', '==');
            return raw.split('=')[1] + ' - (' + raw.split('=')[0].replace('y', '0') + ')';
        } catch(e) { return "0"; }
    }

    function calculatePoints(expr) {
        const f = math.compile(expr);
        let talls = [];
        let points = [];
        
        // Tall Y
        try { talls.push({x: 0, y: Math.round(f.evaluate({x:0})*100)/100, type:'Y'}); } catch(e){}

        for (let x = -10; x <= 10; x += 0.1) {
            let y = f.evaluate({x});
            points.push({x, y});
            if (Math.abs(y) < 0.1) { // Detectar tall X
                let preciseX = x;
                // Refinar cerca del tall X
                for(let r = x-0.1; r <= x+0.1; r+=0.01) {
                    if(Math.abs(f.evaluate({x:r})) < Math.abs(f.evaluate({x:preciseX}))) preciseX = r;
                }
                preciseX = Math.round(preciseX * 100) / 100;
                if (!talls.find(t => t.x === preciseX)) talls.push({x: preciseX, y: 0, type: 'X'});
            }
        }
        
        let txt = talls.map(p => `Punt ${p.type}: (${p.x}, ${p.y})`).join("<br>");
        return { dataSets: [{expr, color:'#0070f3', points}], talls, txt };
    }

    function displayResults(val) {
        document.getElementById('output').classList.remove('hidden');
        document.getElementById('res-val').innerHTML = val;
    }

    function render(sets, talls) {
        const ctx = document.getElementById('mainChart').getContext('2d');
        if (chart) chart.destroy();

        let datasets = sets.map(s => ({
            data: s.points || generatePoints(s.expr),
            borderColor: s.color,
            borderWidth: 3, pointRadius: 0, tension: 0.3, fill: false
        }));

        if (talls.length > 0) {
            datasets.push({
                data: talls, pointBackgroundColor: '#f43f5e', pointRadius: 6, showLine: false
            });
        }

        chart = new Chart(ctx, {
            type: 'line',
            data: { datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', position: 'center', min: -10, max: 10, grid: {color: '#eee'} },
                    y: { type: 'linear', position: 'center', min: -10, max: 10, grid: {color: '#eee'} }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    function generatePoints(expr) {
        const f = math.compile(expr);
        let p = [];
        for(let x=-10; x<=10; x+=0.2) {
            try { let y = f.evaluate({x}); if(isFinite(y)) p.push({x,y}); } catch(e){}
        }
        return p;
    }

    window.onload = () => { solveFunc(); };
</script>
</body>
</html>
