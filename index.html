<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MathEngine v4 - Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
    <style>
        :root { --p: #0070f3; --s: #f5f5f7; --txt: #1d1d1f; --acc: #f43f5e; }
        body { font-family: -apple-system, sans-serif; background: var(--s); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #d2d2d7; flex-shrink: 0; }
        .tab { flex: 1; padding: 16px; text-align: center; cursor: pointer; font-weight: 600; color: #86868b; }
        .tab.active { color: var(--p); border-bottom: 3px solid var(--p); }
        .layout { display: grid; grid-template-columns: 380px 1fr; flex: 1; overflow: hidden; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; overflow-y: auto; } }
        .sidebar { padding: 20px; background: #fff; border-right: 1px solid #d2d2d7; display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--s); border-radius: 12px; padding: 15px; border: 1px solid #d2d2d7; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #d2d2d7; box-sizing: border-box; font-size: 1rem; margin-top: 5px; }
        .btn { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .math { font-family: monospace; font-weight: bold; color: var(--p); font-size: 1.2rem; }
        #canvas-wrap { flex: 1; background: white; margin: 15px; border-radius: 15px; border: 1px solid #d2d2d7; position: relative; min-height: 350px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="tabs">
    <div id="t-func" class="tab active" onclick="tab('func')">Funcions</div>
    <div id="t-eq" class="tab" onclick="tab('eq')">Equacions</div>
    <div id="t-sys" class="tab" onclick="tab('sys')">Sistemes</div>
</div>

<div class="layout">
    <div class="sidebar">
        <div id="p-func">
            <h3>f(x)</h3>
            <input type="text" id="i-func" value="x^2 - 4x + 3">
            <button class="btn" onclick="execFunc()">Dibuixar</button>
        </div>
        <div id="p-eq" class="hidden">
            <h3>Equació</h3>
            <input type="text" id="i-eq" value="3x + 6 = 12">
            <button class="btn" onclick="execEq()">Trobar X</button>
        </div>
        <div id="p-sys" class="hidden">
            <h3>Sistema (Mètode Gràfic)</h3>
            <input type="text" id="i-s1" value="3x + y = 2">
            <input type="text" id="i-s2" value="2x - y = 3" style="margin-top:10px;">
            <button class="btn" onclick="execSys()">Troba la Intersecció</button>
        </div>
        <div id="out" class="hidden">
            <div class="card"><div id="res" class="math"></div></div>
        </div>
    </div>
    <div id="canvas-wrap"><canvas id="chart"></canvas></div>
</div>

<script>
    let miGrafico = null;

    function tab(id) {
        ['p-func', 'p-eq', 'p-sys'].forEach(p => document.getElementById(p).classList.add('hidden'));
        document.getElementById('p-' + id).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('t-' + id).classList.add('active');
        document.getElementById('out').classList.add('hidden');
        if(miGrafico) { miGrafico.destroy(); miGrafico = null; }
    }

    function render(datasets, dots) {
        const ctx = document.getElementById('chart').getContext('2d');
        if(miGrafico) miGrafico.destroy();
        miGrafico = new Chart(ctx, {
            type: 'line',
            data: {
                datasets: datasets.map(d => ({
                    data: d.data, borderColor: d.color, borderWidth: 3, pointRadius: 0, tension: 0.1, fill: false
                })).concat([{ data: dots, pointBackgroundColor: '#f43f5e', pointRadius: 7, showLine: false }])
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', position: 'center', min: -10, max: 10 },
                    y: { type: 'linear', position: 'center', min: -10, max: 10 }
                },
                plugins: { legend: { display: false } }
            }
        });
    }

    // Aquesta funció "neteja" l'entrada perquè mathjs no s'emboliqui
    function clean(str) {
        return str.replace(/\s+/g, '') // treu espais
                  .replace(/([0-9])([xy])/g, '$1*$2') // 3x -> 3*x
                  .replace('=', '=='); // = -> ==
    }

    function execSys() {
        try {
            const eq1 = clean(document.getElementById('i-s1').value);
            const eq2 = clean(document.getElementById('i-s2').value);
            
            // Solució amb mathjs
            const sol = math.solveSystem([eq1, eq2]);
            const xFinal = Math.round(sol[0] * 100) / 100;
            const yFinal = Math.round(sol[1] * 100) / 100;

            const d1 = [], d2 = [];
            for (let i = -10; i <= 10; i++) {
                const r1 = math.solveSystem([eq1.replace(/x/g, `(${i})`), 'x==' + i]);
                d1.push({x: i, y: r1[1]});
                const r2 = math.solveSystem([eq2.replace(/x/g, `(${i})`), 'x==' + i]);
                d2.push({x: i, y: r2[1]});
            }

            document.getElementById('out').classList.remove('hidden');
            document.getElementById('res').innerHTML = `Intersecció: P(${xFinal}, ${yFinal})`;
            render([{data: d1, color: '#0070f3'}, {data: d2, color: '#acc'}], [{x: xFinal, y: yFinal}]);
        } catch(e) {
            document.getElementById('out').classList.remove('hidden');
            document.getElementById('res').innerHTML = "Error de càlcul";
            console.log(e);
        }
    }

    function execFunc() {
        const exp = document.getElementById('i-func').value.replace(/([0-9])x/g, '$1*x');
        const f = math.compile(exp);
        let pts = [], dots = [];
        for(let x = -10; x <= 10; x += 0.2) {
            let y = f.evaluate({x});
            pts.push({x, y});
            if(Math.abs(y) < 0.3) dots.push({x: Math.round(x*100)/100, y: Math.round(y*100)/100});
        }
        document.getElementById('out').classList.remove('hidden');
        document.getElementById('res').innerHTML = "Gràfica generada";
        render([{data: pts, color: '#0070f3'}], dots);
    }

    function execEq() {
        const raw = document.getElementById('i-eq').value;
        const parts = raw.split('=');
        const exp = clean(`(${parts[0]}) - (${parts[1] || 0})`).replace('==', '');
        const f = math.compile(exp);
        let dots = [];
        for(let x = -10; x <= 10; x += 0.05) {
            if(Math.abs(f.evaluate({x})) < 0.1) {
                let valX = Math.round(x * 100) / 100;
                if(!dots.find(d => Math.abs(d.x - valX) < 0.5)) dots.push({x: valX, y: 0});
            }
        }
        document.getElementById('out').classList.remove('hidden');
        document.getElementById('res').innerHTML = dots.length ? `x = ${dots.map(d => d.x).join(', ')}` : "Sense solució";
        // Dibuixem la línia per veure on talla l'eix
        let pts = []; for(let x=-10; x<=10; x+=0.5) pts.push({x, y: f.evaluate({x})});
        render([{data: pts, color: '#0070f3'}], dots);
    }

    window.onload = () => tab('func');
</script>
</body>
</html>
